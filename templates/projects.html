{% extends "base.html" %}
{% block title %}Projects — glymr{% endblock %}

{% block head %}
<style>

  .projects-page {
    padding: 36px;
    max-width: 1440px; margin: 0 auto;
  }

  .projects-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 32px; flex-wrap: wrap; gap: 16px;
  }

  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 18px;
  }

  .project-card {
    background: var(--surface);
    border: 1px solid var(--paper-3);
    border-radius: var(--radius-lg);
    padding: 22px;
    cursor: pointer;
    transition: box-shadow var(--t-slow) var(--ease), border-color var(--t-slow) var(--ease);
  }

  .project-card:hover {
    box-shadow: var(--shadow-lg);
    border-color: rgba(184,146,74,.25);
  }

  .project-card-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 14px;
  }

  .project-card-icon {
    width: 42px; height: 42px;
    background: var(--gold-bg);
    border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .project-card-actions { display: flex; gap: 4px; }

  .project-card-name {
    font-weight: 600; font-size: 15px; color: var(--ink);
    margin-bottom: 4px;
  }

  .project-card-desc {
    font-size: 12px; color: var(--ink-3); margin-bottom: 12px;
    min-height: 18px;
  }

  .project-card-meta {
    font-size: 11px; font-family: var(--font-mono); color: var(--ink-4);
  }

  /* Previews strip */
  .project-preview-strip {
    display: flex; gap: 4px; margin-bottom: 12px; height: 60px;
  }

  .project-preview-thumb {
    flex: 1; border-radius: var(--radius-sm); overflow: hidden;
    background: var(--paper-2);
  }

  .project-preview-thumb img {
    width: 100%; height: 100%; object-fit: cover;
  }

  .project-preview-more {
    flex-shrink: 0; width: 44px;
    display: flex; align-items: center; justify-content: center;
    background: var(--paper-2); border-radius: var(--radius-sm);
    font-size: 11px; font-weight: 600; color: var(--ink-3);
    font-family: var(--font-mono);
  }

  /* Empty state */
  .projects-empty {
    grid-column: 1 / -1;
    text-align: center; padding: 100px 40px; color: var(--ink-3);
  }

  .projects-empty-icon {
    width: 80px; height: 80px;
    border-radius: var(--radius-xl);
    background: var(--paper-2);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px; opacity: .6;
  }

  .projects-empty h3 {
    font-family: var(--font-serif);
    font-size: 24px; color: var(--ink); margin-bottom: 10px;
  }

  .projects-empty p { font-size: 13px; margin-bottom: 24px; }

  /* New project modal */
  .modal-backdrop {
    display: none; position: fixed; inset: 0; z-index: 1000;
    background: rgba(26,22,20,.85); backdrop-filter: blur(10px);
    align-items: center; justify-content: center; padding: 40px;
  }

  .modal-backdrop.open { display: flex; }

  .modal-box {
    background: var(--surface);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-xl);
    width: 100%; max-width: 460px;
    padding: 28px;
  }

  .modal-title {
    font-family: var(--font-serif);
    font-size: 18px; font-weight: 600; color: var(--ink);
    margin-bottom: 20px;
  }

  .modal-actions { display: flex; gap: 8px; margin-top: 20px; }

  @media (max-width: 800px) { .projects-page { padding: 20px; } }
  @media (max-width: 480px) { .projects-grid { grid-template-columns: 1fr; } }

</style>
{% endblock %}

{% block content %}
<div class="projects-page">
  <div class="projects-header">
    <div>
      <div class="eyebrow" style="margin-bottom:4px">My Work</div>
      <h1 style="font-family:var(--font-serif);font-size:26px;font-weight:600;color:var(--ink)">Projects</h1>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <a href="/studio/gallery" class="btn btn-ghost btn-sm">← Gallery</a>
      <button class="btn btn-gold btn-sm" onclick="openNewProjectModal()">+ New Project</button>
    </div>
  </div>

  <div class="projects-grid" id="projectsGrid">
    <div class="projects-empty" id="projectsEmpty" style="display:none">
      <div class="projects-empty-icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--ink-3)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <h3>No projects yet</h3>
      <p>Organise your designs into projects for easy management.</p>
      <button class="btn btn-gold" onclick="openNewProjectModal()">Create your first project</button>
    </div>
  </div>
</div>

<!-- New / rename project modal -->
<div class="modal-backdrop" id="projectModal">
  <div class="modal-box">
    <div class="modal-title" id="projectModalTitle">New Project</div>
    <div class="form-row">
      <label>Project Name</label>
      <input type="text" id="projectNameInput" placeholder="e.g. Bridal Collection 2025" />
    </div>
    <div class="form-row">
      <label>Category <span style="font-weight:400;text-transform:none;font-size:10px;color:var(--ink-4)">(optional)</span></label>
      <input type="text" id="projectCatInput" placeholder="e.g. Jewellery, Rings…" />
    </div>
    <div class="form-row">
      <label>Description <span style="font-weight:400;text-transform:none;font-size:10px;color:var(--ink-4)">(optional)</span></label>
      <textarea id="projectDescInput" placeholder="A short note about this project…" style="min-height:64px"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-gold" style="flex:1" onclick="submitProjectModal()">Save</button>
      <button class="btn btn-ghost" style="flex:1" onclick="closeProjectModal()">Cancel</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let allProjects = [];
let allGalleryItems = [];
let _editingProjectId = null;

/* ── Load ──────────────────────────────────────────────────────────────── */
async function loadProjects() {
  try {
    const [projRes, galleryRes] = await Promise.all([
      fetch('/api/projects'),
      fetch('/api/gallery'),
    ]);
    const projData    = await projRes.json();
    const galleryData = await galleryRes.json();
    allProjects      = projData.projects     || [];
    allGalleryItems  = galleryData.items     || [];
  } catch(e) {
    allProjects = []; allGalleryItems = [];
  }
  renderProjects();
}

/* ── Render ────────────────────────────────────────────────────────────── */
function renderProjects() {
  const grid = document.getElementById('projectsGrid');
  const empty = document.getElementById('projectsEmpty');

  // Remove old cards (keep empty state node)
  Array.from(grid.children).forEach(c => { if (c !== empty) c.remove(); });

  if (!allProjects.length) {
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  allProjects.forEach(p => {
    const items    = allGalleryItems.filter(i => i.project_id === p.id);
    const imgItems = items.filter(i => i.type !== 'model' && i.url);
    const previews = imgItems.slice(0, 3);
    const extra    = items.length - previews.length;

    let previewHTML = '';
    if (previews.length) {
      previewHTML = `<div class="project-preview-strip">
        ${previews.map(i => `<div class="project-preview-thumb"><img src="${i.url}" alt="" loading="lazy"/></div>`).join('')}
        ${extra > 0 ? `<div class="project-preview-more">+${extra}</div>` : ''}
      </div>`;
    }

    const card = document.createElement('div');
    card.className = 'project-card';
    card.dataset.id = p.id;
    card.innerHTML = `
      <div class="project-card-header">
        <div class="project-card-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <div class="project-card-actions">
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openRenameModal('${p.id}','${escQ(p.name)}','${escQ(p.category||'')}','${escQ(p.description||'')}')">Rename</button>
          <button class="btn btn-ghost btn-sm" style="color:var(--error)" onclick="event.stopPropagation();deleteProject('${p.id}')">Delete</button>
        </div>
      </div>
      ${previewHTML}
      <div class="project-card-name">${esc(p.name)}</div>
      <div class="project-card-desc">${esc(p.description || '')}</div>
      <div class="project-card-meta">${p.item_count} item${p.item_count !== 1 ? 's' : ''}${p.category ? ' · ' + esc(p.category) : ''}</div>`;
    card.addEventListener('click', () => viewProjectInGallery(p.id));
    grid.appendChild(card);
  });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escQ(s) {
  return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;');
}

/* ── Navigate to gallery filtered by project ───────────────────────────── */
function viewProjectInGallery(projId) {
  sessionStorage.setItem('galleryProjectFilter', projId);
  window.location.href = '/studio/gallery';
}

/* ── New project modal ─────────────────────────────────────────────────── */
function openNewProjectModal() {
  _editingProjectId = null;
  document.getElementById('projectModalTitle').textContent = 'New Project';
  document.getElementById('projectNameInput').value = '';
  document.getElementById('projectCatInput').value  = '';
  document.getElementById('projectDescInput').value = '';
  document.getElementById('projectModal').classList.add('open');
  setTimeout(() => document.getElementById('projectNameInput').focus(), 50);
}

function openRenameModal(id, name, cat, desc) {
  _editingProjectId = id;
  document.getElementById('projectModalTitle').textContent = 'Rename Project';
  document.getElementById('projectNameInput').value = name;
  document.getElementById('projectCatInput').value  = cat;
  document.getElementById('projectDescInput').value = desc;
  document.getElementById('projectModal').classList.add('open');
  setTimeout(() => document.getElementById('projectNameInput').focus(), 50);
}

function closeProjectModal() {
  document.getElementById('projectModal').classList.remove('open');
  _editingProjectId = null;
}

async function submitProjectModal() {
  const name = document.getElementById('projectNameInput').value.trim();
  const cat  = document.getElementById('projectCatInput').value.trim();
  const desc = document.getElementById('projectDescInput').value.trim();
  if (!name) { showToast('Project name is required.', 'error'); return; }

  try {
    if (_editingProjectId) {
      await fetch(`/api/projects/${_editingProjectId}`, {
        method: 'PATCH', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ name, category: cat, description: desc }),
      });
      const p = allProjects.find(p => p.id === _editingProjectId);
      if (p) { p.name = name; p.category = cat; p.description = desc; }
      showToast('Project updated.', 'success');
    } else {
      const res  = await fetch('/api/projects', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ name, category: cat, description: desc }),
      });
      const data = await res.json();
      if (!data.success) { showToast(data.error || 'Failed to create project.', 'error'); return; }
      allProjects.push({ id: data.id, name: data.name, category: cat, description: desc, item_count: 0 });
      showToast('Project created.', 'success');
    }
    closeProjectModal();
    renderProjects();
  } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

/* ── Delete ────────────────────────────────────────────────────────────── */
async function deleteProject(id) {
  if (!confirm('Delete this project? Gallery items will not be deleted.')) return;
  try {
    await fetch(`/api/projects/${id}`, { method: 'DELETE' });
    allProjects = allProjects.filter(p => p.id !== id);
    renderProjects();
    showToast('Project deleted.');
  } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

/* ── Keyboard / backdrop close ─────────────────────────────────────────── */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeProjectModal();
});
document.getElementById('projectModal').addEventListener('click', e => {
  if (e.target === document.getElementById('projectModal')) closeProjectModal();
});

/* ── Enter submits modal ───────────────────────────────────────────────── */
document.getElementById('projectNameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitProjectModal();
});

loadProjects();
</script>
{% endblock %}
